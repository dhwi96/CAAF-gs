<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Title | Under Review</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #e5e7eb;
      --soft: #f7f7f8;
      --accent: #1f4fd1;
      --accent-hover: #173da3;
      --max-width: 1100px;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      padding: 56px 0 32px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(to bottom, #fafafa, #ffffff);
    }

    .title {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      margin: 0 0 18px;
    }

    .conference {
      text-align: center;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 14px;
      font-size: 0.98rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .authors {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 10px;
    }

    .affiliations {
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      margin-bottom: 24px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 18px;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn:hover {
      text-decoration: none;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn.primary:hover {
      background: var(--accent-hover);
    }

    .section {
      padding: 42px 0;
      border-bottom: 1px solid var(--line);
    }

    .section h2 {
      font-size: 1.6rem;
      margin: 0 0 18px;
      letter-spacing: -0.02em;
    }

    .section p {
      margin: 0 0 14px;
      color: #222;
    }

    .lead {
      font-size: 1.06rem;
      color: #222;
    }

    .viewer-card,
    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .viewer-card {
      padding: 16px;
    }

    .viewer-frame {
      width: 100%;
      height: 640px;
      border: 0;
      border-radius: 14px;
      background:
        radial-gradient(circle at top, #fdfdfd 0%, #f4f5f7 65%, #eceef2 100%);
    }

    .viewer-caption {
      margin-top: 12px;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
    }

    .feature-list {
      margin: 0;
      padding-left: 20px;
      color: #222;
    }

    .feature-list li {
      margin-bottom: 10px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .metric {
      padding: 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--soft);
      text-align: center;
    }

    .metric .value {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .media-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      border: 1px dashed #c8ccd3;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: #fafafa;
      font-weight: 600;
    }

    pre {
      margin: 0;
      overflow-x: auto;
      padding: 18px;
      border-radius: 14px;
      background: #0f172a;
      color: #e5e7eb;
      font-size: 0.93rem;
      line-height: 1.55;
    }

    .footer {
      padding: 28px 0 40px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .subtle {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .viewer-frame {
        height: 480px;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 38px;
      }

      .viewer-frame {
        height: 380px;
      }

      .btn {
        width: 100%;
      }

      .links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="container">
      <div class="conference">Under Review</div>
      <h1 class="title">
        A Compression-Artifact-Aware Framework :<br />

      </h1>

      <div class="authors">

      </div>

      <div class="affiliations">

      </div>

    </div>
      -->

  <div class="viewer-card">
    <iframe

      height="480"
      style="border: 0; border-radius: 14px;"

  </div>

  <div class="viewer-card">
    <iframe

      allowfullscreen>

  </div>      
  </main>

  <footer class="footer">
    <div class="container">
    </div>
  </footer>

</body>
</html>
